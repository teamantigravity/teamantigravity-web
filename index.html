<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GravitySend | Safe Local File Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-400 font-sans min-h-screen flex flex-col justify-between p-6">
    <main class="max-w-2xl mx-auto pt-16 text-center">
        <div class="h-12 w-12 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-white text-xl mx-auto mb-6">▲</div>
        <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">GravitySend</h1>

        <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 max-w-xl mx-auto text-xs font-mono text-slate-400 mb-8">
            <div class="bg-slate-900 p-2 rounded border border-slate-800">Android</div>

            <div class="bg-slate-900 p-2 rounded border border-slate-800">macOS</div>

        </div>

    <footer class="text-center text-xs text-slate-700 font-mono flex justify-center gap-6">
        <a href="/privacy.html" class="hover:text-slate-500">Privacy Policy</a>
